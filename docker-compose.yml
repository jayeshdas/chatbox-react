version: '3.8'

services:
  chatbox:
    build: .
    container_name: chatbox-app
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      LD_LIBRARY_PATH: /lib/x86_64-linux-gnu:/usr/lib/x86_64-linux-gnu
      NODE_OPTIONS: "--max-old-space-size=512"
    volumes:
      - ./backend/chatbox.db:/app/backend/chatbox.db
    stdin_open: true
    tty: true
    restart: always
    command: sh -c "node backend/server.js"
